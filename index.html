<!DOCTYPE html>
<html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Premium Calculator</title><link rel='stylesheet' href='style.css'></head>
<body><div class='bg'></div><div class='calculator'>
<h2>⚡ Premium Calculator</h2>
<input id='display' readonly>
<div class='buttons'>
<button onclick='clearDisplay()' class='red'>AC</button>
<button onclick='deleteLast()' class='blue'>DEL</button>
<button onclick="append('%')">%</button><button onclick="append('/')">÷</button>
<button onclick="append('7')">7</button><button onclick="append('8')">8</button><button onclick="append('9')">9</button><button onclick="append('*')">×</button>
<button onclick="append('4')">4</button><button onclick="append('5')">5</button><button onclick="append('6')">6</button><button onclick="append('-')">−</button>
<button onclick="append('1')">1</button><button onclick="append('2')">2</button><button onclick="append('3')">3</button><button onclick="append('+')">+</button>
<button onclick="append('0')">0</button><button onclick="append('.')">.</button>
<button onclick='calculate()' class='equal'>=</button>
</div></div><script src='script.js'></script></body></html>
